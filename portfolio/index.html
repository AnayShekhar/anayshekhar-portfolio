<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anay Shekhar - ML Systems Engineer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Plus+Jakarta+Sans:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
    <style>
        :root{
            --bg: #000000;
            --text: #ffffff;
            --muted: #888888;
            --panel-bg: rgba(8,8,10,0.96);
            --panel-border: #1f2937;
            --accent: #60a5fa;
            --accent-2: #d4af37;
            --cursor: #d4af37;
            --glow: rgba(212,175,55,0.3);
            --loader-bg: #000000;
            --quick-bg: rgba(255,255,255,0.95);
            --quick-fg: #01204E;
        }

        /* Light theme overrides */
        .theme-light{
            --bg: #f7f7f8;
            --text: #0b1220;
            --muted: #6b7280;
            --panel-bg: rgba(255,255,255,0.9);
            --panel-border: #e6e6e6;
            --accent: #005f73;
            --accent-2: #e9c46a;
            --cursor: #005f73;
            --glow: rgba(0,95,115,0.12);
            --loader-bg: #f7f7f8;
            --quick-bg: rgba(255,255,255,0.95);
            --quick-fg: #01204E;
        }

        /* Dark theme overrides (existing feel) */
        .theme-dark{
            --bg: #000000;
            --text: #ffffff;
            --muted: #888888;
            --panel-bg: rgba(8,8,10,0.96);
            --panel-border: #1f2937;
            --accent: #60a5fa;
            --accent-2: #d4af37;
            --cursor: #d4af37;
            --glow: rgba(212,175,55,0.3);
            --loader-bg: #000000;
            --quick-bg: rgba(255,255,255,0.06);
            --quick-fg: #ffffff;
        }

        /* Retro theme (default) — using user palette: navy, teal, cream, peach, orange */
        .theme-retro{
            --bg: #F6DCAC;      /* cream background */
            --text: #01204E;    /* deep navy for text */
            --muted: #028391;   /* teal for muted accents */
            --panel-bg: rgba(246,220,172,0.95);
            --panel-border: rgba(1,32,78,0.06);
            --accent: #028391;  /* teal */
            --accent-2: #F85525; /* orange/red */
            --accent-3: #FAA968; /* peach */
            --nav-dark: #01204E; /* navy */
            --cursor: #01204E;
            --glow: rgba(2,131,145,0.12);
            --loader-bg: #F6DCAC;
            --quick-bg: linear-gradient(135deg, rgba(255,255,255,0.92), rgba(255,255,255,0.86));
            --quick-fg: #01204E;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Plus Jakarta Sans', sans-serif;
            overflow: hidden;
            cursor: none;
            width: 100vw;
            height: 100vh;
        }

        /* ── LOADER ── */
        #loader-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: var(--loader-bg);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.8s ease, visibility 0.8s;
        }
        #loader-overlay.fade-out {
            opacity: 0;
            visibility: hidden;
        }
        #canvas-container { width: 100%; height: 100%; }

        /* ── MAIN CANVAS ── */
        .container {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1;
            pointer-events: auto;
        }
        canvas { display: block; width: 100%; height: 100%; }

        /* ── PORTFOLIO OVERLAY ── */
        #portfolio-content {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 2;
            opacity: 0;
            transition: opacity 1s ease;
            pointer-events: none;
        }
        #portfolio-content.visible { pointer-events: auto; }

        /* ── CORNER UI ── */
        .logo {
            position: fixed;
            top: 40px; left: 40px;
            z-index: 100;
            font-size: 2em;
            font-weight: 700;
            letter-spacing: 0.1em;
            font-family: 'Plus Jakarta Sans', sans-serif;
            color: var(--text);
            pointer-events: none;
        }

        .menu-icon {
            position: fixed;
            top: 36px; right: 40px;
            z-index: 200;
            font-size: 1.6em;
            cursor: pointer;
            color: var(--text);
            transition: color 0.3s ease, transform 0.3s ease;
            user-select: none;
            line-height: 1;
            width: 32px;
            text-align: center;
        }
        .menu-icon:hover { color: var(--accent-2); }
        .menu-icon.open { transform: rotate(90deg); color: var(--accent-2); }

        .status-left {
            position: fixed;
            bottom: 40px; left: 40px;
            z-index: 100;
            font-size: 0.75em;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            color: var(--muted);
            max-width: 200px;
            line-height: 1.5;
            font-family: 'JetBrains Mono', monospace;
            pointer-events: none;
        }

        .status-right {
            position: fixed;
            bottom: 40px; right: 40px;
            z-index: 250; /* Sits perfectly above all drawers and canvases */
            font-size: 1.5em;
            font-weight: 700;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--text);
            font-family: 'Plus Jakarta Sans', sans-serif;
            transition: color 0.3s ease;
            cursor: pointer;
            pointer-events: auto; /* Forces browser to handle click tracking */
        }
        .status-right:hover { color: var(--accent-2); }

        /* ── NAV DRAWER ── */
        #nav-drawer {
            position: fixed;
            top: 0; right: 0;
            width: 320px;
            height: 100vh;
            background: var(--panel-bg);
            border-left: 1px solid var(--panel-border);
            z-index: 150;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 60px 50px;
            transform: translateX(100%);
            transition: transform 0.45s cubic-bezier(0.77, 0, 0.175, 1);
            backdrop-filter: blur(20px);
        }
        #nav-drawer.open { transform: translateX(0); }

        .nav-label {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.65em;
            letter-spacing: 0.2em;
            color: var(--muted);
            text-transform: uppercase;
            margin-bottom: 32px;
        }

        .nav-items { list-style: none; }
        .nav-items li {
            margin-bottom: 8px;
        }
        .nav-items li a {
            display: block;
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: 2em;
            font-weight: 700;
            color: var(--text);
            text-decoration: none;
            letter-spacing: 0.02em;
            transition: color 0.25s ease, letter-spacing 0.25s ease;
            cursor: pointer;
        }
        .nav-items li a:hover {
            color: var(--accent-2);
            letter-spacing: 0.06em;
        }
        .nav-items li a.active { color: var(--accent); }

        .nav-divider {
            width: 40px;
            height: 1px;
            background: var(--panel-border);
            margin: 36px 0;
        }

        .nav-links { list-style: none; }
        .nav-links li { margin-bottom: 10px; }
        .nav-links li a {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.8em;
            color: var(--muted);
            text-decoration: none;
            letter-spacing: 0.05em;
            transition: color 0.2s;
        }
        .nav-links li a:hover { color: var(--text); }

        /* ── OVERLAY BACKDROP ── */
        #drawer-backdrop {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 140;
            display: none;
        }
        #drawer-backdrop.open { display: block; }

        /* ── ASSET PANEL ── */
        #asset-panel {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%) scale(0.92);
            width: min(700px, 90vw);
            max-height: 80vh;
            background: var(--panel-bg);
            border: 1px solid var(--panel-border);
            z-index: 130;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.35s ease, transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
            overflow-y: auto;
            backdrop-filter: blur(24px);
        }
        #asset-panel.open {
            opacity: 1;
            pointer-events: auto;
            transform: translate(-50%, -50%) scale(1);
        }

        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 28px 36px 24px;
            border-bottom: 1px solid var(--panel-border);
            position: sticky;
            top: 0;
            background: var(--panel-bg);
            z-index: 1;
        }
        .panel-header h2 {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.75em;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--muted);
        }
        .panel-close {
            font-size: 1.2em;
            color: #555;
            cursor: pointer;
            transition: color 0.2s;
            background: none;
            border: none;
            line-height: 1;
        }
        .panel-close:hover { color: var(--text); }

        .panel-body { padding: 36px; }

        /* POKEPY panel */
        .panel-pokepy .project-title {
            font-size: 2em;
            font-weight: 700;
            letter-spacing: 0.05em;
            margin-bottom: 8px;
        }
        .panel-pokepy .project-sub {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.75em;
            color: var(--accent);
            letter-spacing: 0.1em;
            margin-bottom: 28px;
        }
        .panel-pokepy .project-desc {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.88em;
            line-height: 1.8;
            color: var(--muted);
            margin-bottom: 20px;
        }
        .tags { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 28px; }
        .tag {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.7em;
            letter-spacing: 0.08em;
            padding: 4px 10px;
            border: 1px solid var(--panel-border);
            color: var(--muted);
        }
        .stat-row {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
            margin-top: 24px;
        }
        .stat-box {
            padding: 20px;
            border: 1px solid var(--panel-border);
            text-align: center;
        }
        .stat-box .stat-val {
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: 1.6em;
            font-weight: 700;
            color: var(--accent);
        }
        .stat-box .stat-label {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.65em;
            color: #555;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            margin-top: 4px;
        }

        /* RESEARCH panel */
        .panel-research .research-list { list-style: none; }
        .panel-research .research-item {
            padding: 24px 0;
            border-bottom: 1px solid #111;
            display: flex;
            gap: 24px;
            align-items: flex-start;
        }
        .research-num {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.7em;
            color: #333;
            padding-top: 4px;
            min-width: 28px;
        }
        .research-content h4 {
            font-size: 1em;
            font-weight: 700;
            margin-bottom: 6px;
        }
        .research-content p {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.8em;
            color: #666;
            line-height: 1.6;
        }
        .research-status {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.65em;
            padding: 3px 8px;
            margin-top: 8px;
            display: inline-block;
        }
        .status-active { border: 1px solid #22c55e; color: #22c55e; }
        .status-planned { border: 1px solid #f59e0b; color: #f59e0b; }
        .status-completed { border: 1px solid var(--accent); color: var(--accent); }

        /* SYSTEMS panel */
        .panel-systems .sys-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }
        .sys-card {
            padding: 24px;
            border: 1px solid var(--panel-border);
        }
        .sys-card h4 {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.75em;
            color: var(--accent);
            letter-spacing: 0.1em;
            text-transform: uppercase;
            margin-bottom: 12px;
        }
        .sys-card ul { list-style: none; }
        .sys-card ul li {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.8em;
            color: var(--muted);
            padding: 4px 0;
            border-bottom: 1px solid #0f0f0f;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .sys-card ul li::before {
            content: '▸';
            color: var(--muted);
            font-size: 0.7em;
        }
        .progress-bar {
            height: 2px;
            background: #111;
            margin-top: 8px;
        }
        .progress-fill {
            height: 100%;
            background: var(--accent);
            transition: width 0.8s ease;
        }

        /* ENGINEERING panel */
        .panel-engineering .eng-timeline { list-style: none; }
        .eng-item {
            display: flex;
            gap: 24px;
            padding: 20px 0;
            border-bottom: 1px solid #0f0f0f;
            position: relative;
        }
        .eng-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--accent);
            margin-top: 6px;
            flex-shrink: 0;
        }
        .eng-dot.gold { background: var(--accent-2); }
        .eng-dot.green { background: #22c55e; }
        .eng-content h4 {
            font-size: 0.95em;
            font-weight: 700;
            margin-bottom: 4px;
        }
        .eng-content span {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.72em;
            color: #555;
        }
        .eng-content p {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.78em;
            color: #777;
            margin-top: 6px;
            line-height: 1.5;
        }

        /* ── CURSOR ── */
        .cursor-dot {
            position: fixed;
            width: 8px; height: 8px;
            background: var(--cursor);
            border-radius: 50%;
            pointer-events: none;
            z-index: 9999;
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        .cursor-dot.active { opacity: 1; }
        .glow-ring {
            position: fixed;
            width: 40px; height: 40px;
            border: 1px solid var(--glow);
            border-radius: 50%;
            pointer-events: none;
            z-index: 9998;
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        .glow-ring.active { opacity: 1; }

        /* scrollbar */
        #asset-panel::-webkit-scrollbar { width: 4px; }
        #asset-panel::-webkit-scrollbar-track { background: transparent; }
        #asset-panel::-webkit-scrollbar-thumb { background: var(--panel-border); }
        /* bottom-left quick buttons (visible, icon-based) */
        #theme-quick{
            position: fixed;
            left: 18px;
            bottom: 18px;
            z-index: 320;
            display: flex;
            gap: 10px;
            align-items: center;
        }
        .theme-quick-btn{
            width: 52px; height: 52px;
            border-radius: 12px;
            border: 1px solid rgba(0,0,0,0.06);
            background: var(--quick-bg);
            display: inline-flex; align-items: center; justify-content: center;
            cursor: pointer; box-shadow: 0 6px 20px rgba(12,12,14,0.08);
            transition: transform 0.12s ease, box-shadow 0.12s ease, background 0.12s, color 0.12s;
            color: var(--quick-fg);
        }
        .theme-quick-btn svg{ width: 22px; height: 22px; display: block; }
        /* controller PNG as mask to allow tinting via currentColor */
        .theme-quick-btn .icon{
            width: 22px; height: 22px; display: block;
            background-color: currentColor;
            -webkit-mask: url('assets/controller.png') center/contain no-repeat;
            mask: url('assets/controller.png') center/contain no-repeat;
        }
        .theme-quick-btn:active{ transform: translateY(1px) scale(0.99); }
        .theme-quick-btn.active{
            background: var(--accent);
            color: #fff;
            box-shadow: 0 10px 30px rgba(0,0,0,0.18);
            transform: translateY(-2px) scale(1.02);
            border-color: rgba(0,0,0,0.12);
        }
        /* individual visual tweaks */
        /* button back to normal size; icon scaled inside */
        #theme-btn-retro{ background: linear-gradient(135deg, var(--accent-3), var(--accent-2)); color: #081826; width: 52px; height: 52px; border-radius: 12px; overflow: visible; }
        #theme-btn-retro .icon{ width: 48px; height: 48px; background-size: contain; display: block; }
        /* remove dark outline/border when selected; keep subtle scale feedback */
        #theme-btn-retro.active{ color: #fff; transform: translateY(-2px) scale(1.06); box-shadow: none; border-color: transparent; outline: none; }
        #theme-btn-retro:focus { outline: none; }
        #theme-btn-retro:focus-visible { outline: none; }

        /* dark-mode: force controller icon to white for contrast */
        .theme-dark #theme-btn-retro { background: linear-gradient(135deg, rgba(255,255,255,0.06), rgba(255,255,255,0.04)); }
        .theme-dark #theme-btn-retro .icon { background-color: #ffffff; }
        /* retro mode: when selected, use retro navy/blue as the selected color */
        .theme-retro #theme-btn-retro.active { background: var(--nav-dark); color: #ffffff; }
        .theme-retro #theme-btn-retro.active .icon { background-color: #ffffff; }
    </style>
</head>
<body>

    <div id="loader-overlay">
        <div id="canvas-container"></div>
    </div>

    <div class="container">
        <canvas id="mainCanvas"></canvas>
    </div>

    <div class="logo">ANAY</div>

    <div class="menu-icon" id="menuIcon">⋮</div>

    <div class="status-right" id="statusRight">POKEPY</div>

    <div class="cursor-dot"></div>
    <div class="glow-ring"></div>

    <div id="drawer-backdrop"></div>

    <nav id="nav-drawer">
        <p class="nav-label">Navigation</p>
        <ul class="nav-items">
            <li><a href="#" data-asset="POKEPY" class="active">Pokepy</a></li>
            <li><a href="#" data-asset="RESEARCH">Research</a></li>
            <li><a href="#" data-asset="SYSTEMS">Systems</a></li>
            <li><a href="#" data-asset="ENGINEERING">Engineering</a></li>
        </ul>
        <div class="nav-divider"></div>
        <ul class="nav-links">
            <li><a href="https://github.com" target="_blank">GitHub ↗</a></li>
            <li><a href="https://linkedin.com" target="_blank">LinkedIn ↗</a></li>
            <li><a href="mailto:anay@example.com">Contact ↗</a></li>
        </ul>
    </nav>

    <div id="asset-panel">
        <div class="panel-header">
            <h2 id="panel-label">// POKEPY</h2>
            <button class="panel-close" id="panelClose">✕</button>
        </div>
        <div class="panel-body" id="panel-body">
            </div>
    </div>

    <div id="portfolio-content"></div>

    <div id="theme-switcher" aria-label="Theme switcher">
        <button id="theme-retro" title="Retro" aria-pressed="true" style="background:#e9d8a6">R</button>
        <button id="theme-light" title="Light" aria-pressed="false" style="background:#f7f7f8">L</button>
        <button id="theme-dark"  title="Dark"  aria-pressed="false" style="background:#0b0b0b;color:#fff">D</button>
        <div class="label">Theme</div>
    </div>

        <!-- Bottom-left quick theme buttons -->
        <div id="theme-quick" aria-hidden="false">
            <button class="theme-quick-btn" id="theme-btn-light" data-theme="light" aria-label="Light theme" title="Light">
                <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                    <circle cx="12" cy="12" r="4" fill="currentColor" />
                    <g stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
                        <line x1="12" y1="2" x2="12" y2="4" />
                        <line x1="12" y1="20" x2="12" y2="22" />
                        <line x1="2" y1="12" x2="4" y2="12" />
                        <line x1="20" y1="12" x2="22" y2="12" />
                        <line x1="4.2" y1="4.2" x2="5.6" y2="5.6" />
                        <line x1="18.4" y1="18.4" x2="19.8" y2="19.8" />
                        <line x1="4.2" y1="19.8" x2="5.6" y2="18.4" />
                        <line x1="18.4" y1="5.6" x2="19.8" y2="4.2" />
                    </g>
                </svg>
            </button>
            <button class="theme-quick-btn" id="theme-btn-dark"  data-theme="dark"  aria-label="Dark theme" title="Dark">
                <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                    <path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z" fill="currentColor" />
                </svg>
            </button>
            <button class="theme-quick-btn" id="theme-btn-retro" data-theme="retro" aria-label="Retro theme" title="Retro">
                <span class="icon" aria-hidden="true"></span>
            </button>
        </div>

    <script src="main.js"></script>
</body>
</html>
